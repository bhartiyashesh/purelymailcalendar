name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build metadata
        id: meta
        run: |
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          REPO_LC=$(echo "${GITHUB_REPOSITORY,,}")
          echo "image=ghcr.io/${REPO_LC}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          build-args: |
            COMMIT_SHA=${{ steps.meta.outputs.sha }}
            BUILD_TIME=${{ steps.meta.outputs.built_at }}
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short }}
            ${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.sha }}

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          SHA: ${{ steps.meta.outputs.sha }}
          BUILT_AT: ${{ steps.meta.outputs.built_at }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::notice::RAILWAY_TOKEN not set; skipping Railway deploy."
            echo "Add it under Settings → Secrets and variables → Actions to enable auto-deploy."
            exit 0
          fi
          curl -fsSL https://railway.com/install.sh | sh
          # Push COMMIT_SHA + BUILD_TIME to the Railway service env so the
          # running container reports the right values at /api/version,
          # regardless of whether Railway rebuilds the image or pulls from GHCR.
          railway variables --service web \
            --set "COMMIT_SHA=$SHA" \
            --set "BUILD_TIME=$BUILT_AT"
          railway up --service web --ci

      - name: Summary
        run: |
          {
            echo "## Build complete"
            echo ""
            echo "- Commit: \`${{ steps.meta.outputs.short }}\`"
            echo "- Built at: ${{ steps.meta.outputs.built_at }}"
            echo "- Image: \`${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short }}\`"
            echo ""
            echo "Anyone can verify the running build matches this commit:"
            echo ""
            echo '\`\`\`'
            echo "curl https://purelymailcalendar.com/api/version"
            echo '\`\`\`'
          } >> "$GITHUB_STEP_SUMMARY"
